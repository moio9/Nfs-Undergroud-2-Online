# U2Online server config.
#
# Local testing:
#   keep public endpoints at 127.0.0.1.
#
# Remote hosting:
#   change the public endpoints to your server IP/hostname, but keep listen
#   endpoints on 0.0.0.0 unless you intentionally want to bind one interface.

# Public endpoints advertised to clients.
SERVER_MAX_PLAYERS=1
SERVER_CONN_RATE_LIMIT=20
SERVER_CONN_RATE_WINDOW=10
SERVER_CONN_RATE_BLOCK=5
BOOTSTRAP_ENDPOINT=127.0.0.1:20921
LOBBY_ENDPOINT=127.0.0.1:20922
# Keep RACE_ENDPOINT, RACE_LISTEN, and client/online/configs/ONLINE.cfg
# race_port aligned for local testing, otherwise clients receive a relay port
# that this process is not actually listening on.
RACE_ENDPOINT=127.0.0.1:5000
INCLUDE_RELAY_FIELDS=1
RACE_VIRTUAL_PEER_MODE=off
RACE_VIRTUAL_PEER_SUBNET=100.64.0.0/30
LAN_LOOPBACK_ALIAS_PEERS=1
UDP_RELAY_RESET_ON_GAME_START=0
# Stock behavior: gsea applies CUSTFLAGS/CUSTMASK filters for race mode,
# car/performance class, and related room options. Set to 0 to list all public
# games regardless of those CUSTFLAGS filters.
LAN_GSEA_CUST_FILTERS=1
# Original game UDP endpoint used inside wrapped peer packets. This is not the
# relay listen port. For local/same-LAN testing, make sure UDP 3658 is free on
# each client machine before starting the game.
UDP_GAME_PORT=3658

# Local sockets opened by this process.
BOOTSTRAP_LISTEN=0.0.0.0:20921
LOBBY_LISTEN=0.0.0.0:20922
RACE_LISTEN=0.0.0.0:5000

# Control/social endpoints.
CONTROL_ENDPOINT=127.0.0.1:20923
CONTROL_ALIAS_ENDPOINT=127.0.0.1:13505
CONTROL_LISTEN=0.0.0.0:20923
CONTROL_ALIAS_LISTEN=0.0.0.0:13505

# Account validation mode.
# 0 = LAN/no account verification.
# 1 = Online/account verification.
AUTH_VERIFY=0
AUTH_ALLOW_CREATE=1
AUTH_ACCOUNTS_FILE=data/auth_accounts.json
AUTH_LEGACY_MASKS=ed5faa76adec3f22520b6c90ec35acd4,1773180069,759374d7097b0ea0
LAN_PERSONA_RESERVED_NAMES=
LAN_PERSONA_FORBIDDEN_WORDS=
LAN_PERSONA_BLACKLIST_FILE=data/persona_blacklist.txt
LAN_PERSONA_BLACKLIST_CODE=invp
LAN_PERSONA_BLACKLIST_CPER_CODE=
LAN_PERSONA_BLACKLIST_PERS_CODE=pset

# Data files.
ADMIN_BANS_FILE=data/admin_bans.json
RANK_FILE=data/rankings.dat
STATS_FILE=data/stats.dat
GAME_REPORTS_FILE=data/game_reports.dat

UDP_DEBUG=off
