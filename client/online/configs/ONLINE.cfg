# U2Online client config.
# Copy this file next to SPEED2.EXE as ONLINE.cfg.
#
# For a remote server, change server_host to the server IP/hostname.
# Per-service hosts are optional; if omitted, they use server_host.

server_host = 127.0.0.1

# Optional per-service host overrides.
# bootstrap_host = 127.0.0.1
# lobby_host = 127.0.0.1
# race_host = 127.0.0.1
# control_host = 127.0.0.1
# control_alias_host = 127.0.0.1
# lan_host = 127.0.0.1

# Server ports. If a port is omitted, the built-in default is used.
bootstrap_port = 20921
lobby_port = 20922
race_port = 2000
control_port = 20923
control_alias_port = 13505

# LAN browser override and server injection.
# In the default release setup, LAN and Online share the same lobby port: 20922.
lan_override_host = on
lan_port = 20922
lan_provider_seed = on

debug = on
